name = "code-reviewer-worker"
main = "src/index.ts"
compatibility_date = "2025-01-01"
compatibility_flags = ["nodejs_compat"]
account_id = "ae69af7599a04bcb6938b1b7f47a9fd2"

[vars]
LANGSMITH_PROJECT = "code-reviewer"

[[durable_objects.bindings]]
name = "Sandbox"
class_name = "Sandbox"

[[migrations]]
tag = "v1"
new_classes = ["Sandbox"]

[observability]
enabled = false
head_sampling_rate = 1

[observability.logs]
enabled = true
head_sampling_rate = 1
persist = true
invocation_logs = true

[observability.traces]
enabled = false
persist = true
head_sampling_rate = 1

# Set the following via: wrangler secret put <NAME>
#   GOOGLE_API_KEY
#   SUPABASE_URL
#   SUPABASE_SERVICE_ROLE_KEY
#   GITHUB_TOKEN
#   GITHUB_WEBHOOK_SECRET
#   LANGSMITH_API_KEY
